# yaml-language-server: $schema=https://www.coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit review configuration for the EPF dev-update site.
#
# Policy: CodeRabbit is a best-effort second opinion. The real review gate is
# `/code-review`, the strict zensical build (`zensical build --strict`, which
# fails on broken links and other errors), and Ivan's own self-review. A green,
# neutral, or empty CodeRabbit check is NOT an approval. See CLAUDE.md.
#
# This file pins behavior so it is explicit and version-controlled instead of
# relying on dashboard defaults. NOTE: when CodeRabbit stays "Review in
# progress" or posts a blocked-review stub, it is the free-for-OSS hourly
# per-developer rate limit on this public repo, not out of credits, and no YAML
# setting can unblock it. Wait out the window, or force a fresh pass with
# `@coderabbitai full review`.

language: en-US
early_access: false

reviews:
  # assertive = more thorough, surfaces more (incl. nitpicks). Chosen because
  # CodeRabbit only runs best-effort here, so maximize signal when it does run.
  profile: assertive

  # Best-effort reviewer: never let it block a merge via "request changes".
  request_changes_workflow: false

  high_level_summary: true
  review_status: true
  poem: false

  auto_review:
    enabled: true
    drafts: false
    auto_incremental_review: true
    base_branches:
      - main

  # Exclusions only. Everything not listed is still reviewed. These are
  # generated build output and the lock file, none of it hand-reviewable.
  path_filters:
    - "!uv.lock"
    - "!site/**" # zensical build output (gitignored)
    - "!docs/updates/**" # generated by zensical-updates from updates/ (gitignored)

  path_instructions:
    - path: "updates/**/*.md"
      instructions: >-
        These are EPF dev-update posts. HARD RULE (do NOT violate): the body
        prose of a weekly dev update must be the fellow's own writing, so never
        rewrite it, never suggest replacement prose, and never propose AI-drafted
        paragraphs. Limit review to front matter, links, formatting, and broken
        references. Front matter: `date`, `title`, and `categories` are required;
        write `categories`/`tags` as YAML block lists (`- weekly-update`), never
        flow lists (`[weekly-update]`). zensical's strict link check reads `[x]`
        in front matter as an unresolved Markdown reference link and fails the
        build, so flag a flow list, and do NOT report a block-list `[x]` that
        isn't there. Allowed categories: weekly-update, project-update, news.
    - path: "docs/**/*.md"
      instructions: >-
        Hub/about/project prose, agent-drafted then rewritten in Ivan's voice.
        Apply the house writing style and flag violations: no em-dashes used as
        subphrase separators (use commas or two sentences), no contrastive
        negation (no "not X, but Y"; state the positive directly), prefer active
        voice and varied sentence length, no filler openers ("Let's dive in") or
        summary closers ("In conclusion"), and avoid AI-tell vocabulary (delve,
        leverage, robust, seamless, tapestry, landscape, and similar). Each page
        needs a `description` front-matter line for its meta tag.
    - path: ".github/workflows/*.yml"
      instructions: >-
        Deliberate choices, do NOT flag as issues: GitHub Actions are pinned to
        full commit SHAs (not version tags) on purpose; `permissions: {}` at the
        top with per-job least-privilege grants, `persist-credentials: false`,
        and the harden-runner step are load-bearing hardening. The build job runs
        on PRs as a strict gate and the deploy job runs only on push to main.
    - path: "tools/**/*.py"
      instructions: >-
        The social-card generator. Imports go at the top of the file. It must
        run after `zensical build` because `--clean` wipes `site/`, and it writes
        the rasterized card into the built `site/` tree.
    - path: "zensical.toml"
      instructions: >-
        Site configuration. This site has its own indigo/violet palette and
        theme; that is intentional and not a copy of another project. The strict
        build is the gate, so flag config that would break `--strict`.
    - path: "CHANGELOG.md"
      instructions: >-
        Keep a Changelog format. This site deploys continuously, so new entries
        go under `## [Unreleased]` in the matching category (Added / Changed /
        Fixed / Security). Do not insert a category heading into the middle of an
        existing list, which silently relabels the entries above it.

chat:
  auto_reply: true
