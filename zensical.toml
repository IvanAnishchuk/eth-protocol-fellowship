[project]
site_name = "Ivan Anishchuk, EPF"
site_description = "Ivan Anishchuk's Ethereum Protocol Fellowship cohort-seven dev updates and project notes."
# Must be an absolute URL ending in a trailing slash: overrides/main.html and
# the tools build absolute URLs by concatenating onto it. tools/check_jsonld.py
# (via tools/_config.py) fails the gate if either invariant is broken.
site_url = "https://ivananishchuk.github.io/eth-protocol-fellowship/"
repo_url = "https://github.com/IvanAnishchuk/eth-protocol-fellowship"
repo_name = "IvanAnishchuk/eth-protocol-fellowship"
docs_dir = "docs"
site_dir = "site"
copyright = "Released to the public domain under CC0-1.0."

# Brand stylesheet, linked after the theme CSS so its custom-property overrides
# win. Carries the indigo/violet palette (matching docs/assets/) and the display
# typography. See docs/stylesheets/brand.css.
extra_css = ["stylesheets/brand.css"]

nav = [
    { "Home" = "index.md" },
    { "Project" = "project.md" },
    { "Updates" = "updates/index.md" },
    { "Browse" = [
        { "Tags" = "updates/tags/index.md" },
        { "Categories" = "updates/categories/index.md" },
        { "Archive" = "updates/archive/index.md" },
    ] },
    { "About" = "about.md" },
]

[project.extra]
# Author identity for the schema.org Person node emitted in
# overrides/main.html. Kept here so the name and URL live in one place; the
# Person's sameAs links are pulled from the social entries below.
author_name = "Ivan Anishchuk"
author_url = "https://ivananishchuk.com"

# Updates (blog) generation for the zensical-updates sidecar (a namespace
# zensical itself ignores). Posts live in updates/; the generated section is
# written to docs/updates/ (gitignored) by `zensical-updates build` before the
# site build.
[project.extra.zensical_updates]
base = "updates"
source = "updates"
# Taxonomy index pages: the tag/category clouds and the Browse cross-links. All
# default on; stated here so the site's intent is visible and turning one off is
# a one-line edit.
emit_tags = true
emit_categories = true
emit_archive = true

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]
language = "en"
logo = "assets/logo.svg"
favicon = "assets/favicon.svg"
# Template overrides layered on the built-in theme (overrides/ shadows matching
# templates, everything else falls through). Carries the themed 404 page.
custom_dir = "overrides"
features = [
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.tracking",
    "navigation.top",
    "navigation.indexes",
    "navigation.footer",
    "search.highlight",
    "search.suggest",
    "content.code.copy",
    "content.code.annotate",
    "content.tabs.link",
    "content.tooltips",
    "toc.follow",
]

# Display/body/code typography. Loaded from Google Fonts by the theme. Hanken
# Grotesk reads cleanly for long-form update posts; Archivo (the display face,
# applied to headings in brand.css) gives the headings an engineered grotesque
# weight. JetBrains Mono carries SSZ/code snippets.
[project.theme.font]
text = "Hanken Grotesk"
code = "JetBrains Mono"

# Custom palette: primary/accent resolve to `data-md-color-*=custom` body
# attributes, and brand.css supplies the actual indigo/violet values for both
# the light (default) and dark (slate) schemes.
[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

# Footer social icons carrying Ivan's presence: GitHub profile, X, Farcaster,
# LinkedIn, and website, plus the Updates RSS feed. The source repo already
# shows in the header via repo_url, so it stays out of the footer. `name`
# becomes each link's title.
[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/IvanAnishchuk"
name = "Ivan on GitHub"

[[project.extra.social]]
icon = "fontawesome/brands/x-twitter"
link = "https://x.com/IvanAnishchuk"
name = "Ivan on X"

[[project.extra.social]]
icon = "simple/farcaster"
link = "https://farcaster.xyz/IvanAnishchuk"
name = "Ivan on Farcaster"

[[project.extra.social]]
icon = "fontawesome/brands/linkedin"
link = "https://www.linkedin.com/in/ivananishchuk"
name = "Ivan on LinkedIn"

[[project.extra.social]]
icon = "fontawesome/solid/globe"
link = "https://ivananishchuk.com"
name = "ivananishchuk.com"

[[project.extra.social]]
icon = "fontawesome/solid/rss"
link = "https://ivananishchuk.github.io/eth-protocol-fellowship/updates/feed.xml"
name = "Updates feed (RSS)"

# ----------------------------------------------------------------------------
# Markdown extensions (the standard Material/zensical set, copied from
# cuere/zensical.toml minus the library-specific API-reference extensions).
# ----------------------------------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
