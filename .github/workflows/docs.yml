# Build the site and deploy it to GitHub Pages.
# Build runs on every push/PR to main as a CI gate (zensical --strict); deploy
# runs only on push to main. The build is two-step: the zensical-updates sidecar
# generates the Updates section into docs/updates/ (gitignored) first, then
# zensical builds the site. After the build, tools/social_card.py rasterizes the
# site-wide social card into site/assets/ (it needs the cairo system library;
# brand fonts are vendored in tools/fonts/, so no font download is required).
# Hardened with pinned action SHAs, harden-runner, persist-credentials:false, and
# least-privilege permissions.
# NOTE: GitHub Pages must be enabled (Settings -> Pages -> Source: GitHub
# Actions) before the deploy job can succeed; it is enabled for this repo.
# Re-verify the action SHAs periodically (pins go stale).
name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    # Cancel superseded build runs for the same ref (e.g. PR re-pushes).
    concurrency:
      group: docs-build-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install system libraries for card rendering
        # cairosvg rasterizes the social card through the cairo runtime library
        # (libfontconfig comes in as a dependency). Brand fonts are vendored in
        # tools/fonts/, so no font download is needed.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcairo2

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install dependencies
        # Top-level deps only (zensical, zensical-updates, cairosvg): no dev
        # group, and package = false, so nothing is built editable. --frozen
        # installs the exact pins from uv.lock.
        run: uv sync --frozen --no-dev

      - name: Run unit tests
        # Unit-test the llms_txt/check_jsonld helpers. Adds the dev group
        # (pytest) on top of the build env; the build steps below reuse the env
        # with --no-sync.
        run: uv run --frozen --group dev pytest -q

      - name: Generate Updates section
        # The zensical-updates sidecar writes docs/updates/ (gitignored) from the
        # updates/ sources. Must run before the build: the nav points at
        # docs/updates/index.md, which only exists after this step.
        run: uv run --no-sync zensical-updates build

      - name: Build site (strict)
        # --no-sync: reuse the env from the install step instead of letting
        # `uv run` re-sync (which would drop --no-dev).
        run: uv run --no-sync zensical build --clean --strict

      - name: Merge sitemaps
        # zensical's sitemap covers its nav pages only; the sidecar writes a
        # sitemap for the Updates section at site/updates/sitemap.xml. This
        # unions every <loc> under site/ into a single de-duplicated
        # site/sitemap.xml, so a crawler reaching /sitemap.xml discovers the
        # posts. Runs after the build (which wipes site/) and on PRs so a broken
        # merge fails the gate.
        run: uv run --no-sync python tools/sitemap_merge.py

      - name: Generate social card
        # Rasterizes docs/assets/social-card-bg.svg into the built tree at
        # site/assets/social-card.png (referenced by overrides/main.html). Runs
        # after the build because `zensical build --clean` wipes site/, and on
        # PRs as well so a broken render fails the gate.
        run: uv run --no-sync python tools/social_card.py

      - name: Generate llms.txt
        # Splices the Updates list into the curated header and writes
        # site/llms.txt. Runs after the build (which wipes site/) and on PRs so
        # a broken generate fails the gate.
        run: uv run --no-sync python tools/llms_txt.py

      - name: Validate JSON-LD
        # Parses the built pages and asserts each page type carries the expected
        # schema.org structured data; fails the gate on drift.
        run: uv run --no-sync python tools/check_jsonld.py

      - name: Upload Pages artifact
        # Only on push to main; PR runs are a build-only --strict gate.
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/

  deploy:
    name: Deploy to GitHub Pages
    # Deploy only from main; PRs run build-only as the docs gate.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # GitHub Pages best practice: serialize deploys and never cancel one in
    # progress — a cancelled production deploy can leave Pages in a stuck state.
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
