[project]
name = "eth-protocol-fellowship-site"
version = "0"
description = "Build environment for the EPF dev-update site (zensical)."
requires-python = "==3.14.*"
dependencies = [
    # Rasterizes the site-wide social card (tools/social_card.py) at build time;
    # needs the cairo system library on the build host.
    "cairosvg>=2.7,<3",
    # Pre-1.0 doc tooling, upper-bounded to the tested minor (matches cuere).
    "zensical>=0.0.45,<0.1",
    # The Updates section is generated by our own zensical-updates sidecar
    # (clean-room rewrite, separate repo), run as a pre-build step.
    "zensical-updates>=0.1.6,<0.2",
    # Front-matter parsing for tools/llms_txt.py (already in the tree via
    # zensical; pinned directly so the llms.txt step does not rely on a
    # transitive dep).
    "pyyaml>=6,<7",
]

[dependency-groups]
# Test-only. CI installs with --no-dev; run locally with `uv run pytest`.
dev = [
    "pytest>=8,<9",
]

[tool.pytest.ini_options]
# tools/ is not a package; expose its modules to the tests by path.
pythonpath = ["tools"]
testpaths = ["tests"]

[tool.uv]
package = false
